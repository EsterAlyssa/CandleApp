<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CandleApp</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#006B55">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="assets/logo.png">
    
    <link rel="stylesheet" href="css/light.css">
    <link rel="stylesheet" href="css/dark.css" media="(prefers-color-scheme: dark)">
    <link rel="stylesheet" href="css/style.css">
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="light">

    <!-- Header/top bar, gestito da JS -->
    <header id="top-bar" class="hidden"></header>

    <!-- Main app container -->
    <main id="app-container"></main>

    <!-- Bottom navigation, gestito da JS -->
    <nav class="bottom-nav hidden"></nav>

    <!-- JS entrypoint (cache-busted) -->
    <script type="module" src="js/main.js?v=3"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
